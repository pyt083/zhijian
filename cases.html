  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #4F6EF7;
    --primary-dark: #3B54D4;
    --primary-light: #6B8AFF;
    --accent-blue: #2DB7F5;
    --accent-purple: #8B5CF6;
    --bg-primary: #F8FAFF;
    --bg-white: #FFFFFF;
    --text-primary: #0F172A;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --border-light: #E2E8F0;
    --shadow-sm: 0 1px 3px rgba(79,110,247,0.06);
    --shadow-md: 0 4px 20px rgba(79,110,247,0.08);
    --shadow-lg: 0 12px 40px rgba(79,110,247,0.12);
    --shadow-xl: 0 20px 60px rgba(79,110,247,0.15);
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --gradient-primary: linear-gradient(135deg, #1e3a8a, #2563eb);
  }

  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-primary);
    background: var(--bg-primary);
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ========= Nav ========= */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 72px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(226,232,240,0.6);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 20px; font-weight: 800; color: var(--text-primary);
    text-decoration: none;
  }
  .nav-logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--gradient-primary);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px; font-weight: 900;
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    text-decoration: none; color: var(--text-secondary); font-size: 15px; font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--primary); }
  .nav-links a.active { color: var(--primary); }
  .nav-actions { display: flex; gap: 12px; align-items: center; }
  .btn-nav-login {
    padding: 8px 20px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer;
    text-decoration: none; color: var(--primary);
    border: 1px solid var(--border-light); background: transparent;
    transition: all 0.2s ease;
  }
  .btn-nav-login:hover { border-color: var(--primary); background: rgba(79,110,247,0.04); }
  .btn-nav-cta {
    padding: 8px 22px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer;
    text-decoration: none; color: white;
    background: var(--gradient-primary); border: none;
    box-shadow: 0 2px 12px rgba(79,110,247,0.3);
    transition: all 0.25s ease;
  }
  .btn-nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79,110,247,0.4); }

  /* ========= Hero ========= */
  .cases-hero {
    position: relative; padding: 140px 48px 60px;
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%);
    overflow: hidden; text-align: center;
  }
  .cases-hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .cases-hero-content { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; }
  .cases-hero .section-tag {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 16px; border-radius: 100px;
    background: rgba(255,255,255,0.15);
    color: #E0E7FF; font-size: 13px; font-weight: 600;
    margin-bottom: 18px; letter-spacing: 0.5px;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .cases-hero h1 {
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 900; color: #FFFFFF;
    margin-bottom: 16px; letter-spacing: -0.02em; line-height: 1.2;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .cases-hero p {
    font-size: 16px; color: rgba(255,255,255,0.8); line-height: 1.7;
  }

  /* ========= Filter ========= */
  .filter-bar {
    position: sticky; top: 72px; z-index: 100;
    display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
    padding: 16px 48px;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-light);
  }
  .filter-btn {
    padding: 7px 18px; border-radius: 100px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border-light); background: white;
    color: var(--text-secondary); transition: all 0.2s ease;
  }
  .filter-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .filter-btn.active {
    background: var(--gradient-primary); color: white;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(79,110,247,0.25);
  }

  /* ========= Masonry Grid (CSS columns) ========= */
  .cases-section { padding: 48px 48px 90px; }
  .cases-masonry {
    column-count: 4;
    column-gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 1200px) { .cases-masonry { column-count: 3; } }
  @media (max-width: 900px) { .cases-masonry { column-count: 2; } }
  @media (max-width: 600px) { .cases-masonry { column-count: 1; } }

  .case-card {
    break-inside: avoid;
    margin-bottom: 20px;
    border-radius: var(--radius-lg);
    background: var(--bg-white);
    border: 1px solid var(--border-light);
    overflow: hidden; transition: all 0.35s ease;
    cursor: pointer;
    display: block;
  }
  .case-card:hover {
    transform: translateY(-5px); box-shadow: var(--shadow-xl);
    border-color: transparent;
  }

  /* Thumbnail — shows video's native aspect ratio, no cropping */
  .case-thumb-wrap {
    position: relative; width: 100%;
    background: #0a0a1a;
    overflow: hidden;
  }
  .case-thumb-wrap img {
    display: block; width: 100%; height: auto;
  }
  .case-play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.92); border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--primary); cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: all 0.25s ease; z-index: 3;
  }
  .case-card:hover .case-play-btn {
    background: var(--primary); color: white;
    box-shadow: 0 6px 24px rgba(79,110,247,0.4);
    transform: translate(-50%,-50%) scale(1.1);
  }
  /* Duration badge */
  .case-duration {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.7); color: white;
    font-size: 12px; font-weight: 600;
    padding: 2px 8px; border-radius: 6px;
    z-index: 3;
  }

  .case-card-info {
    padding: 16px 18px;
  }
  .case-card-info h4 {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 8px;
  }
  .case-card-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .case-card-tags span {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px;
    background: rgba(79,110,247,0.07); color: var(--primary);
  }

  /* ========= Footer ========= */
  .footer {
    background: #0C1222; padding: 40px 48px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .footer-inner { max-width: 1080px; margin: 0 auto; }
  .footer p { color: rgba(255,255,255,0.35); font-size: 13px; line-height: 1.8; }
  .footer a { color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
  .footer a:hover { color: var(--primary-light); }

  /* ========= Back to top ========= */
  .back-top {
    position: fixed; bottom: 32px; right: 32px; z-index: 999;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--gradient-primary); color: white;
    border: none; cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 28px rgba(79,110,247,0.3);
    opacity: 0; transform: translateY(20px); transition: all 0.3s ease;
  }
  .back-top.show { opacity: 1; transform: translateY(0); }
  .back-top:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(79,110,247,0.4); }

  /* ========= Video Modal ========= */
  .video-modal-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }
  .video-modal-overlay.active {
    opacity: 1; visibility: visible;
  }
  .video-modal-box {
    position: relative;
    background: #000; border-radius: var(--radius-lg);
    overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    transform: scale(0.92) translateY(20px);
    transition: transform 0.35s ease;
    max-width: 90vw; max-height: 88vh;
  }
  .video-modal-overlay.active .video-modal-box {
    transform: scale(1) translateY(0);
  }
  .video-modal-box video {
    display: block; max-width: 90vw; max-height: 88vh;
  }
  .video-modal-close {
    position: absolute; top: -44px; right: 0;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15); color: white;
    border: none; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .video-modal-close:hover { background: rgba(255,255,255,0.3); }
  .video-modal-title {
    position: absolute; bottom: -44px; left: 0;
    color: rgba(255,255,255,0.8); font-size: 14px;
    font-weight: 500; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    max-width: calc(100% - 60px);
  }

  /* ========= Responsive ========= */
  @media (max-width: 768px) {
    .nav { padding: 0 20px; }
    .nav-links { display: none; }
    .cases-hero, .cases-section, .footer { padding-left: 20px; padding-right: 20px; }
    .cases-hero { padding-top: 110px; padding-bottom: 40px; }
    .filter-bar { padding: 12px 20px; top: 66px; }
  }
</style>
</head>

// 视频和缩略图资源托管在 insai-invision 仓库，使用绝对 URL 前缀
var ASSET_PREFIX = 'https://pyt083.github.io/insai-invision/cases/';
caseData.forEach(function(c) {
  if (c.thumb && c.thumb.indexOf('http') !== 0) { c.thumb = ASSET_PREFIX + c.thumb; }
  if (c.video && c.video.indexOf('http') !== 0) { c.video = ASSET_PREFIX + c.video; }
});

var currentFilter = 'all';

function formatDuration(sec) {
  var m = Math.floor(sec / 60);
  var s = Math.floor(sec % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function renderCases(filter) {
  var grid = document.getElementById('casesGrid');
  grid.innerHTML = '';
  var filtered = filter === 'all' ? caseData : caseData.filter(function(c) {
    return c.industries.indexOf(filter) >= 0;
  });
  filtered.forEach(function(c) {
    var tags = c.industries.slice(0,4).map(function(t){return '<span>'+t+'</span>';}).join('');
    var durStr = c.duration ? formatDuration(c.duration) : '';
    var thumbHtml = c.thumb
      ? '<img src="' + c.thumb + '" alt="' + c.title + '" loading="lazy">'
      : '<div style="width:100%;aspect-ratio:' + c.w + '/' + c.h + ';background:#0a0a1a"></div>';
    var html = '<div class="case-card" data-video="' + c.video + '" data-title="' + c.title.replace(/"/g, '&quot;') + '">' +
      '<div class="case-thumb-wrap">' +
        thumbHtml +
        '<button class="case-play-btn">&#9654;</button>' +
        (durStr ? '<span class="case-duration">' + durStr + '</span>' : '') +
      '</div>' +
      '<div class="case-card-info">' +
        '<h4>' + c.title + '</h4>' +
        '<div class="case-card-tags">' + tags + '</div>' +
      '</div>' +
    '</div>';
    grid.insertAdjacentHTML('beforeend', html);
  });
  // Bind clicks
  grid.querySelectorAll('.case-card').forEach(function(card) {
    card.addEventListener('click', function() {
      openVideoModal(this.dataset.video, this.dataset.title);
    });
  });
}

// Filter
document.getElementById('filterBar').addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    renderCases(currentFilter);
  }
});

// Back to top
window.addEventListener('scroll', function() {
  var btn = document.getElementById('backTop');
  if (window.scrollY > 400) { btn.classList.add('show'); }
  else { btn.classList.remove('show'); }
});

// Video Modal
var modal = document.getElementById('videoModal');
var modalVideo = document.getElementById('modalVideo');
var modalTitle = document.getElementById('videoModalTitle');

function openVideoModal(src, title) {
  modalVideo.src = src;
  modalTitle.textContent = title || '';
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  setTimeout(function() { modalVideo.play(); }, 350);
}
function closeVideoModal() {
  modal.classList.remove('active');
  modalVideo.pause();
  document.body.style.overflow = '';
  setTimeout(function() { modalVideo.src = ''; }, 300);
}
document.getElementById('videoModalClose').addEventListener('click', closeVideoModal);
modal.addEventListener('click', function(e) { if (e.target === modal) closeVideoModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeVideoModal(); });

renderCases('all');
</script>
